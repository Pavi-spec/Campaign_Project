<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>

<sly data-sly-call="${clientlib.css @ categories='drive.campaign'}"/>

<sly data-sly-call="${clientlib.js @ categories='drive.campaign'}"/>

<sly data-sly-use.model="com.drive.core.models.CampaignCardModel"/>

<div class="campaign-card">

    <div class="offer-badge">
        ${model.offer}
    </div>
<br>
    <img
            src="${model.image}"
            alt="${model.title}"
            class="campaign-image"/>

    <h2>${model.title}</h2>

    <p>${model.description}</p>

    <button class="details-btn">
        ${model.buttonText}
    </button>

</div>
